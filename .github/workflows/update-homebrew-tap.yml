name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"  # strip leading 'v'
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Download and hash the x64 DMG
          X64_URL="https://github.com/jacobpowaza/NewKap/releases/download/${{ github.event.release.tag_name }}/Kap-${VERSION}-mac-x64.dmg"
          ARM64_URL="https://github.com/jacobpowaza/NewKap/releases/download/${{ github.event.release.tag_name }}/Kap-${VERSION}-mac-arm64.dmg"

          X64_SHA=$(curl -sL "$X64_URL" | shasum -a 256 | cut -d' ' -f1)
          ARM64_SHA=$(curl -sL "$ARM64_URL" | shasum -a 256 | cut -d' ' -f1)

          echo "x64_url=$X64_URL" >> $GITHUB_OUTPUT
          echo "arm64_url=$ARM64_URL" >> $GITHUB_OUTPUT
          echo "x64_sha=$X64_SHA" >> $GITHUB_OUTPUT
          echo "arm64_sha=$ARM64_SHA" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: MuntasirMalek/homebrew-newkap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update cask formula
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          X64_SHA="${{ steps.release.outputs.x64_sha }}"
          ARM64_SHA="${{ steps.release.outputs.arm64_sha }}"
          X64_URL="${{ steps.release.outputs.x64_url }}"
          ARM64_URL="${{ steps.release.outputs.arm64_url }}"

          cat > Casks/newkap.rb << EOF
          cask "newkap" do
            version "${VERSION}"

            on_intel do
              sha256 "${X64_SHA}"
              url "${X64_URL}"
            end

            on_arm do
              sha256 "${ARM64_SHA}"
              url "${ARM64_URL}"
            end

            name "Kap"
            desc "Community-driven screen recorder (Kap fork)"
            homepage "https://github.com/jacobpowaza/NewKap"

            app "Kap.app"

            postflight do
              system_command "/usr/bin/xattr", args: ["-cr", "#{appdir}/Kap.app"]
              system_command "/usr/bin/tccutil", args: ["reset", "ScreenCapture", "com.wulkano.kap"]
            end

            zap trash: [
              "~/Library/Application Support/NewKap",
              "~/Library/Application Support/Kap",
              "~/Library/Preferences/com.newkap.app.plist",
              "~/Library/Logs/NewKap",
              "~/Library/Logs/Kap",
            ]
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/newkap.rb
          git commit -m "Update Kap to ${{ github.event.release.tag_name }}"
          git push
